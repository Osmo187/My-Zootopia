<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Animal Repository</title>

    <style>
        html {
            background-color: #ffe9e9;
        }

        body {
            font-family: 'Roboto', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            padding: 1rem;
            max-width: 1200px;
            margin: auto;
        }

        h1 {
            text-align: center;
            font-size: 40px;
            font-weight: normal;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            list-style: none;
            padding: 0;
        }

        .cards__item {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 1rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .cards__item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .card__title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .card__text {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .animal-details {
          padding-left: 15px;
          margin: 0;
        }

        .animal-details li {
          margin-bottom: 5px;
          font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <h1>My Animal Repository</h1>

    <ul class="cards">
        __REPLACE_ANIMALS_INFO__
    </ul>
</body>
</html>
